<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奚李杰的课表同步</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f9;
            --text: #334155;
            --card: #ffffff;
            --orange: #f39c12; /* 橙黄色：用于时间地点 */
            --course-bg: #f0f7ff;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .info-bar { font-size: 0.9rem; color: #64748b; margin-top: 10px; line-height: 1.6; }
        
        .table-wrapper {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow-x: auto;
            padding: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        /* 表头样式 */
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            padding: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* 单元格通用样式 */
        td {
            padding: 15px 10px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        /* 第一列：节次时间列 */
        td:first-child {
            background-color: #f8fafc;
            font-weight: 600;
            color: var(--primary);
            min-width: 140px;
            border-right: 1px solid #e2e8f0;
        }

        .time-slot { font-size: 0.75rem; color: #94a3b8; font-weight: normal; margin-top: 4px; display: block; }

        /* 课程块内部样式 */
        .course-item {
            display: block;
            background: var(--course-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            text-align: left;
            border-left: 4px solid var(--primary);
        }
        .course-name {
            display: block;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .hl-orange {
            color: var(--orange);
            font-weight: 500;
        }

        /* 隐藏空行和无意义行 */
        .hidden-row { display: none; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 奚李杰的周课表</h1>
            <div class="info-bar">
                2025-2026学年第2学期 | 学号：55240720<br>
                <small>更新于：2026-02-27 01:05</small>
            </div>
        </header>

        <div class="table-wrapper">
            <table class="schedule-table" id="target-table">
                <thead>
                    <tr>
                        <th>节次/时间</th>
                        <th>周一</th>
                        <th>周二</th>
                        <th>周三</th>
                        <th>周四</th>
                        <th>周五</th>
                        <th>周六</th>
                        <th>周日</th>
                    </tr>
                </thead>
                <tbody id="course-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>

        const timeTable = [

            { label: "第3节-第4节", time: "10:00-11:40", detail: "10:00-10:45 / 10:55-11:40" },
            { label: "第5节-第6节", time: "13:30-15:10", detail: "13:30-14:15 / 14:25-15:10" },
            { label: "第7节-第8节", time: "15:30-17:10", detail: "15:30-16:15 / 16:25-17:10" },
            { label: "第9节-第10节", time: "18:20-19:50", detail: "18:20-19:05 / 19:06-19:50" },

        ];

            ["第3节-第4节", "", "ae22393004-思想政治理论课实践教学[16]\n9周,星期1,第3节-第4节前卫-萃文教学楼-第八阶梯,\nae22393004-思想政治理论课实践教学[16]\n6-8周,星期1,第3节-第4节线上教学-前卫,\nae22393004-思想政治理论课实践教学[16]\n3-5周,星期1,第3节-第4节线上教学-前卫,\nae22393004-思想政治理论课实践教学[16]\n2周,星期1,第3节-第4节前卫-萃文教学楼-第八阶梯", "ae22553003-数据结构课程设计[02]\n2-10周,星期2,第1节-第4节计算机软件实验室（三）B212-213", "ae22931301-概率论与数理统计A[12]\n1-14周,星期3,第3节-第4节前卫-逸夫楼-第十二阶梯", "", "ae22931301-概率论与数理统计A[12]\n8-14周,星期5,第3节-第4节前卫-逸夫楼-第十二阶梯", "", ""],
            ["第5节-第6节", "", "ae22551005-算法设计与分析A[02]\n1-12周,星期1,第5节-第6节前卫-逸夫楼-第十阶梯", "ae22921004-体育Ⅳ[95]\n1-3周,5-16周,星期2,第5节-第6节无", "ae22551006-人工智能引论[02]\n1-8周,星期3,第5节-第6节前卫-敬信教学楼-F区第十阶梯,\nae22552005-数据库系统原理[02]\n11-13周,星期3,第5节-第8节软件综合实验室1A108", "ae22393004-思想政治理论课实践教学[16]\n6-7周,10周,星期4,第5节-第6节线上教学-前卫,\nae22393004-思想政治理论课实践教学[16]\n9周,星期4,第5节-第6节前卫-萃文教学楼-第八阶梯,\nae22393004-思想政治理论课实践教学[16]\n3-5周,星期4,第5节-第6节线上教学-前卫,\nae22393004-思想政治理论课实践教学[16]\n2周,星期4,第5节-第6节前卫-萃文教学楼-第八阶梯,\nae22552004-操作系统原理[02]\n14-16周,星期4,第5节-第8节软件综合实验室1A108", "ae22552022-Java程序设计[02]\n3-4周,6-8周,星期5,第5节-第8节软件综合实验室1A108", "ae22551024-计算方法B[01]\n1-10周,星期6,第5节-第8节前卫-敬信教学楼-F区第四阶梯", ""],
            ["第7节-第8节", "", "ae22551006-人工智能引论[02]\n1-8周,星期1,第7节-第8节前卫-敬信教学楼-F区第十阶梯", "ae22552022-Java程序设计[02]\n1-3周,5-8周,星期2,第7节-第8节前卫-敬信教学楼-F区第四阶梯", "ae22552005-数据库系统原理[02]\n11-13周,星期3,第5节-第8节软件综合实验室1A108,\nae22552004-操作系统原理[02]\n1-8周,星期3,第7节-第8节前卫-敬信教学楼-F区第十一阶梯", "ae22552004-操作系统原理[02]\n14-16周,星期4,第5节-第8节软件综合实验室1A108,\nae22552022-Java程序设计[02]\n1-7周,9周,星期4,第7节-第8节前卫-第三教学楼-第十四阶梯", "ae22552022-Java程序设计[02]\n3-4周,6-8周,星期5,第5节-第8节软件综合实验室1A108", "ae22551024-计算方法B[01]\n1-10周,星期6,第5节-第8节前卫-敬信教学楼-F区第四阶梯", ""],
            ["第9节-第10节", "", "ae22391004-毛泽东思想和中国特色社会主义理论体系概论[17]\n9周,星期1,第9节-第10节线上教学-前卫,\nae22391004-毛泽东思想和中国特色社会主义理论体系概论[17]\n1-8周,10周,星期1,第9节-第10节前卫-法学楼-106", "ae22552022-Java程序设计[02]\n4周,星期2,第9节-第10节前卫-敬信教学楼-F区第三阶梯", "ae22552005-数据库系统原理[02]\n1-8周,星期3,第9节-第10节前卫-敬信教学楼-F区第十一阶梯", "ae22552004-操作系统原理[02]\n1-8周,星期4,第9节-第11节前卫-敬信教学楼-F区第五阶梯", "ae22552022-Java程序设计[02]\n5周,星期5,第9节-第12节软件综合实验室1A108", "ae22552005-数据库系统原理[02]\n1-8周,星期6,第9节-第11节前卫-敬信教学楼-F区第十一阶梯", ""],
            ["第11节-第12节", "", "", "", "", "ae22552004-操作系统原理[02]\n1-8周,星期4,第9节-第11节前卫-敬信教学楼-F区第五阶梯", "ae22552022-Java程序设计[02]\n5周,星期5,第9节-第12节软件综合实验室1A108", "ae22552005-数据库系统原理[02]\n1-8周,星期6,第9节-第11节前卫-敬信教学楼-F区第十一阶梯", ""]
        ];

        // 3. 渲染函数
        const tbody = document.getElementById('course-body');

        rawData.forEach((row, rowIndex) => {
            const tr = document.createElement('tr');
            
            row.forEach((cell, cellIndex) => {
                // 跳过表格中多余的第二列（空列）
                if (cellIndex === 1) return;

                const td = document.createElement('td');
                let content = cell.trim();

                // 处理第一列：节次和具体时间
                if (cellIndex === 0) {
                    const timeInfo = timeTable.find(t => t.label === content);
                    td.innerHTML = `<strong>${content}</strong><span class="time-slot">${timeInfo.time}</span><span style="font-size:10px; color:#cbd5e1">${timeInfo.detail}</span>`;
                } 
                // 处理课程内容列
                else if (content !== "") {
                    // 处理可能存在多门课在一个单元格的情况
                    const courses = content.split(',\n');
                    let html = "";
                    
                    courses.forEach(c => {
                        let lines = c.split('\n').filter(l => l.trim() !== "");
                        if (lines.length > 0) {
                            html += `<div class="course-item">`;
                            // 第一行通常是课程名
                            html += `<span class="course-name">${lines[0]}</span>`;
                            // 后面的行处理时间地点高亮
                            lines.slice(1).forEach(line => {
                                let highlighted = line.replace(/(\d+-\d+周|\d+周|星期\d|第\d+节-第\d+节|前卫-.*?阶梯|计算机.*?B\d+|软件综合.*?|线上教学.*?|无)/g, 
                                    '<span class="hl-orange">$1</span>');
                                html += `<div style="margin-top:2px;">${highlighted}</div>`;
                            });
                            html += `</div>`;
                        }
                    });
                    td.innerHTML = html;
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
